---
- name: Prepare benchmark host
  hosts: bench_hosts
  become: true

  vars:
    bench_user: bench
    user_shell: /usr/bin/fish
    bench_repo_dir: "/home/{{ bench_user }}/aoc-bench"
    bench_repo_url: "https://github.com/ictrobot/aoc-bench.git"
    bench_repo_branch: master
    cloudflare_env_file: "/home/{{ bench_user }}/.config/aoc-bench/cloudflare.env"
    isolated_cores: "0-11"
    # yamllint disable rule:line-length
    host_description: >-
      [Hetzner EX44](https://www.hetzner.com/dedicated-rootserver/ex44/) instance with an
      [Intel i5-13500](https://www.intel.com/content/www/us/en/products/sku/230580/intel-core-i513500-processor-24m-cache-up-to-4-80-ghz/specifications.html).
      Benchmarks isolated to the 6 P-cores.
    # yamllint enable rule:line-length

  pre_tasks:
    - name: Set timezone to UTC
      become: true
      community.general.timezone:
        name: UTC

    - name: Ensure APT cache is up to date
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Stop aoc-bench service before updates
      ansible.builtin.systemd:
        name: aoc-bench.service
        state: stopped
      when: "'aoc-bench.service' in ansible_facts.services"

    - name: Upgrade all packages to latest
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true

    - name: Install tools
      ansible.builtin.apt:
        name:
          - fish
          - ufw
          - build-essential
          - git
          - curl
          - wget
          - htop
          - screen
          - lm-sensors
          - linux-perf
          - strace
          - hwloc-nox
          - jq
          - tuned
          - stress-ng
          - s-tui
          - btop
          - gdu
          - sqlite3
          - sqlite3-tools
          - valgrind
          - time
          - hyperfine
          - icdiff
          - nvme-cli
          - smartmontools
          - nodejs
          - npm
        state: present

    - name: Change root shell
      ansible.builtin.user:
        name: root
        shell: "{{ user_shell }}"

    # Firewall
    - name: Validate allowed SSH subnets
      ansible.builtin.assert:
        that:
          - ssh_allowed_subnets is defined
          - ssh_allowed_subnets is sequence
          - ssh_allowed_subnets is not string
          - ssh_allowed_subnets | length > 0
          - (ssh_allowed_subnets | reject('string') | list | length) == 0
          - (ssh_allowed_subnets | select('search', '/') | list | length) == (ssh_allowed_subnets | length)
          - (ssh_allowed_subnets | ansible.utils.ipaddr | length) == (ssh_allowed_subnets | length)
        fail_msg: >-
          Define ssh_allowed_subnets in inventory as a non-empty YAML list of IPv4/IPv6 CIDR networks,
          for example `["203.0.113.1/32", "2001:db8::/48"]`.

    - name: Enable UFW logging
      community.general.ufw:
        logging: 'on'
      become: true

    - name: Allow SSH from allowed subnets
      community.general.ufw:
        rule: allow
        direction: in
        port: 22
        proto: tcp
        src: "{{ item }}"
      loop: "{{ ssh_allowed_subnets }}"
      become: true

    - name: Remove SSH allow any rule
      community.general.ufw:
        rule: allow
        direction: in
        port: 22
        proto: tcp
        src: any
        delete: true
      become: true

    - name: Deny incoming traffic
      community.general.ufw:
        direction: incoming
        policy: deny
      become: true

    - name: Allow outgoing traffic
      community.general.ufw:
        direction: outgoing
        policy: allow
      become: true

    - name: Enable UFW
      community.general.ufw:
        state: enabled
      become: true

    # Allow perf access
    - name: Allow users to profile their own processes in userspace
      ansible.posix.sysctl:
        name: kernel.perf_event_paranoid
        value: "1"
        sysctl_set: true
        reload: true

    # CPU partitioning and tuning
    - name: Enabled tuned service
      ansible.builtin.systemd:
        name: tuned
        enabled: true
        state: started

    # Don't set no_balance_cores=(/isolcpus) as that would disable scheduler load balancing on those cores, which is
    # required for multithreaded benchmarks without pinning threads to specific cores.
    - name: Configure tuned cpu-partitioning profile
      ansible.builtin.lineinfile:
        path: /etc/tuned/cpu-partitioning-variables.conf
        regexp: '^isolated_cores=.+'
        line: 'isolated_cores={{ isolated_cores }}'

    # Custom profile inheriting cpu-partitioning but with intel_pstate re-enabled
    # for max turbo boost. See /usr/lib/tuned/profiles/cpu-partitioning/tuned.conf
    # which also includes network-latency and latency-performance.
    - name: Install custom tuned aoc-bench profile
      ansible.builtin.copy:
        src: files/tuned.conf
        dest: /etc/tuned/profiles/aoc-bench/
        owner: root
        group: root
        mode: "0644"
        directory_mode: "0755"

    - name: Check current tuned profile
      ansible.builtin.command: tuned-adm active
      register: tuned_profile
      changed_when: false
      failed_when: false

    - name: Enable tuned aoc-bench profile
      ansible.builtin.command: tuned-adm profile aoc-bench
      when: "'Current active profile: aoc-bench' not in tuned_profile.stdout"
      changed_when: true

    - name: Check kernel cmdline
      ansible.builtin.command: cat /proc/cmdline
      register: cmdline
      changed_when: false

    - name: Reboot to apply CPU isolation and tuned cmdline
      ansible.builtin.reboot:
        reboot_timeout: 600
      when: >-
        ("nohz_full=" ~ isolated_cores) not in cmdline.stdout
        or "intel_pstate=disable" in cmdline.stdout

    - name: Disable unattended upgrades
      ansible.builtin.systemd:
        name: apt-daily-upgrade.timer
        enabled: false
        state: stopped

    # User setup
    - name: Ensure bench user exists
      ansible.builtin.user:
        name: "{{ bench_user }}"
        shell: "{{ user_shell }}"
        create_home: true
        state: present

    - name: Add SSH key for bench user
      ansible.posix.authorized_key:
        user: "{{ bench_user }}"
        key: "{{ bench_ssh_pubkey }}"
        state: present

    - name: Check whether rustup is already installed for bench user
      become: true
      become_user: "{{ bench_user }}"
      ansible.builtin.stat:
        path: "~{{ bench_user }}/.cargo/bin/rustup"
      register: bench_rustup

    - name: Download rustup installer for bench user
      become: true
      become_user: "{{ bench_user }}"
      ansible.builtin.get_url:
        url: https://sh.rustup.rs
        dest: "~{{ bench_user }}/rustup-init.sh"
        mode: "0755"
      when: not bench_rustup.stat.exists

    - name: Install rustup for bench user
      become: true
      become_user: "{{ bench_user }}"
      ansible.builtin.command: "~{{ bench_user }}/rustup-init.sh -y"
      args:
        creates: "~{{ bench_user }}/.cargo/bin/rustup"
      when: not bench_rustup.stat.exists

    - name: Remove rustup installer for bench user
      become: true
      become_user: "{{ bench_user }}"
      ansible.builtin.file:
        path: "~{{ bench_user }}/rustup-init.sh"
        state: absent

    - name: Ensure benchmark repo is cloned
      become: true
      become_user: "{{ bench_user }}"
      ansible.builtin.git:
        repo: "{{ bench_repo_url }}"
        dest: "{{ bench_repo_dir }}"
        version: "{{ bench_repo_branch }}"
        accept_hostkey: true
        update: true
        force: false

    - name: Ensure host config directory exists
      become: true
      become_user: "{{ bench_user }}"
      ansible.builtin.file:
        path: "{{ bench_repo_dir }}/data/hosts"
        state: directory
        owner: "{{ bench_user }}"
        group: "{{ bench_user }}"
        mode: "0755"

    - name: Write host config
      become: true
      become_user: "{{ bench_user }}"
      ansible.builtin.copy:
        content: "{{ host_config | to_nice_json }}\n"
        dest: "{{ bench_repo_dir }}/data/hosts/{{ inventory_hostname }}.json"
        owner: "{{ bench_user }}"
        group: "{{ bench_user }}"
        mode: "0644"
      vars:
        host_config: >-
          {{
            {'cpu_affinity': isolated_cores}
            | combine({'description': host_description} if host_description is defined else {})
          }}

    - name: Ensure benchmark config directory exists
      ansible.builtin.file:
        path: "/home/{{ bench_user }}/.config/aoc-bench"
        state: directory
        owner: "{{ bench_user }}"
        group: "{{ bench_user }}"
        mode: "0700"

    - name: Ensure benchmark state directory exists
      ansible.builtin.file:
        path: "/home/{{ bench_user }}/.local/state/aoc-bench"
        state: directory
        owner: "{{ bench_user }}"
        group: "{{ bench_user }}"
        mode: "0700"

    - name: Check whether Cloudflare env file exists
      ansible.builtin.stat:
        path: "{{ cloudflare_env_file }}"
      register: cloudflare_env

    - name: Ensure Cloudflare env file has strict permissions when present
      ansible.builtin.file:
        path: "{{ cloudflare_env_file }}"
        state: file
        owner: "{{ bench_user }}"
        group: "{{ bench_user }}"
        mode: "0600"
      when: cloudflare_env.stat.exists | default(false)

    - name: Check wrangler version
      ansible.builtin.command: wrangler --version
      register: wrangler_version
      changed_when: false
      failed_when: false

    - name: Install wrangler v4 globally
      ansible.builtin.command: npm install -g wrangler@4
      when: wrangler_version.rc != 0 or (wrangler_version.stdout is not search('^4\\.'))
      changed_when: true

    - name: Install aoc-bench systemd unit
      ansible.builtin.template:
        src: templates/aoc-bench.service.j2
        dest: /etc/systemd/system/aoc-bench.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd daemon
        - Restart aoc-bench service

    - name: Flush handlers
      ansible.builtin.meta: flush_handlers

    - name: Ensure aoc-bench service is enabled and running
      ansible.builtin.systemd:
        name: aoc-bench.service
        enabled: true
        state: started

  handlers:
    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart aoc-bench service
      ansible.builtin.systemd:
        name: aoc-bench.service
        state: restarted
