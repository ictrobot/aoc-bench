[main]
summary=cpu-partitioning with intel_pstate and deep C-states for max turbo
include=cpu-partitioning

[cpu]
# Override latency-performance's force_latency to allow all C-states, as idle cores in deep sleep = more turbo headroom
force_latency=none

[bootloader]
priority=10
# Override cpu-partitioning's cmdline to remove intel_pstate=disable, allowing the CPU to reach max turbo boost
cmdline_cpu_part=+nohz=on${cmd_isolcpus} nohz_full=${isolated_cores} rcu_nocbs=${isolated_cores} tuned.non_isolcpus=${not_isolated_cpumask} nosoftlockup
