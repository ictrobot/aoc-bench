output:
  - summary
  - failure

pre-commit:
  parallel: true
  commands:
    rustfmt:
      run: cargo fmt --all --check
    clippy:
      run: cargo clippy --all --all-targets -- -Dwarnings
    test:
      run: cargo nextest run --all
    doctest:
      run: cargo test --doc --all
    docs:
      run: cargo doc --workspace --no-deps --document-private-items
      env:
        RUSTDOCFLAGS: -Dwarnings
    web_build:
      run: npm run build
      root: web/
    web_test:
      run: npm run test
      root: web/
    web_lint:
      run: npm run lint
      root: web/
