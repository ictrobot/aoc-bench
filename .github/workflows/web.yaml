name: Web
on: [push]
jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: npm ci
        run: npm ci
      - name: npm run build
        run: npm run build
      - name: npm run test
        run: npm run test
      - name: npm run lint
        run: npm run lint
